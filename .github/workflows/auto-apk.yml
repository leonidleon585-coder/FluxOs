name: Generate APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout project code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Устанавливаем Gradle глобально на сервер, так как в репозитории нет gradlew
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Find Project and Build APK
      run: |
        # Ищем, где лежит файл build.gradle или build.gradle.kts
        BUILD_FILE=$(find . -name "build.gradle*" -print -quit)
        
        if [ -z "$BUILD_FILE" ]; then
          echo "Ошибка: Проект Android не найден (нет build.gradle)!"
          exit 1
        fi
        
        # Переходим в папку с проектом
        SUB_DIR=$(dirname "$BUILD_FILE")
        echo "Проект найден в папке: $SUB_DIR"
        cd "$SUB_DIR"
        
        # Запускаем сборку через глобальный gradle
        gradle assembleDebug
        
        # Переносим готовый APK в корень для загрузки в артефакты
        mkdir -p $GITHUB_WORKSPACE/output_apk
        APK_PATH=$(find . -name "*.apk" -print -quit)
        if [ -z "$APK_PATH" ]; then
          echo "Ошибка: APK не скомпилировался!"
          exit 1
        fi
        cp "$APK_PATH" $GITHUB_WORKSPACE/output_apk/app-debug.apk

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Project-APK
        path: output_apk/app-debug.apk
        
