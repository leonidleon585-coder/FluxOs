name: Generate APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout project code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find Gradle and Build APK
      run: |
        # Ищем, в какой папке лежит gradlew
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Ошибка: Файл gradlew вообще не найден в репозитории!"
          exit 1
        fi
        
        # Получаем директорию, где лежит gradlew
        SUB_DIR=$(dirname "$GRADLEW_PATH")
        echo "Проект найден в папке: $SUB_DIR"
        
        # Переходим туда, даем права и собираем
        cd "$SUB_DIR"
        chmod +x gradlew
        ./gradlew assembleDebug
        
        # Переносим готовый APK в корень, чтобы шаг сохранения его нашел
        mkdir -p $GITHUB_WORKSPACE/output_apk
        cp $(find . -name "*.apk" -print -quit) $GITHUB_WORKSPACE/output_apk/app-debug.apk

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Project-APK
        path: output_apk/app-debug.apk
        
